<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <link rel="manifest" href="manifest.json">
    <title>Spectrum Analyzer</title>
    <style>
        body { 
            background: #000; color: white; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 10px; overflow: hidden; touch-action: none; 
        }
        canvas { 
            width: 95vw; height: auto; max-width: 800px; 
            background: #050505; border: 1px solid #222; border-radius: 8px;
        }
        .controls { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; 
            width: 95%; max-width: 500px; margin-top: 15px; 
            background: #111; padding: 15px; border-radius: 10px; 
        }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 11px; color: #666; margin-bottom: 5px; font-weight: bold; }
        input[type=range] { width: 100%; height: 25px; }
        #startBtn { 
            margin-top: 20px; padding: 15px; width: 90%; max-width: 400px;
            background: #333; color: #fff; border: 1px solid #555; border-radius: 8px;
            font-size: 16px; font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="400"></canvas>
    
    <div class="controls">
        <div class="control-group"><label>SENSITIVITY</label><input type="range" id="gain" min="1" max="10" value="5"></div>
        <div class="control-group"><label>FALL SPEED</label><input type="range" id="speed" min="1" max="10" value="5"></div>
        <div class="control-group"><label>BAR WIDTH</label><input type="range" id="width" min="5" max="50" value="20"></div>
        <div class="control-group"><label>COLOR SHIFT</label><input type="range" id="color" min="0" max="360" value="140"></div>
    </div>

    <button id="startBtn">START BARS ANALYZER</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('startBtn');
        let barHeights = new Array(32).fill(0);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                const source = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128; // Mai puține benzi pentru bare mai groase
                source.connect(analyser);
                
                const data = new Uint8Array(analyser.frequencyBinCount);
                btn.style.display = 'none';

                function draw() {
                    requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(data);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    const g = document.getElementById('gain').value / 2;
                    const s = document.getElementById('speed').value / 20;
                    const bW = parseInt(document.getElementById('width').value);
                    const hueBase = parseInt(document.getElementById('color').value);

                    const spacing = 5;
                    const totalBars = Math.min(data.length, 30);
                    const startX = (canvas.width - (totalBars * (bW + spacing))) / 2;

                    for (let i = 0; i < totalBars; i++) {
                        let targetHeight = data[i] * g;
                        
                        // Cădere lină
                        if (targetHeight > barHeights[i]) {
                            barHeights[i] = targetHeight;
                        } else {
                            barHeights[i] -= (barHeights[i] - targetHeight) * s;
                        }

                        // Gradient culoare bazat pe înălțime
                        let hue = (hueBase + (i * 5)) % 360;
                        ctx.fillStyle = `hsla(${hue}, 80%, 50%, 0.8)`;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = `hsla(${hue}, 80%, 50%, 0.5)`;

                        // Desenare bară (de jos în sus)
                        ctx.fillRect(
                            startX + i * (bW + spacing), 
                            canvas.height - barHeights[i], 
                            bW, 
                            barHeights[i]
                        );

                        // Vârfurile (Peak meters)
                        ctx.fillStyle = "#fff";
                        ctx.fillRect(startX + i * (bW + spacing), canvas.height - barHeights[i] - 2, bW, 2);
                    }
                }
                draw();
            } catch (err) {
                alert("Eroare: " + err.message);
            }
        };
    </script>
</body>
</html>
