<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0c0a">
    <link rel="manifest" href="manifest.json">
    <title>Kashtan VFD Android</title>
    <style>
        body { 
            background: #1a1c1a; 
            color: #78a890; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            touch-action: none;
        }
        
        h2 { font-size: 1.2rem; letter-spacing: 3px; margin: 10px 0; }

        .vfd-container {
            background: #0a0c0a;
            padding: 10px;
            border-radius: 10px;
            border: 3px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            width: 95vw;
            max-width: 600px;
            box-sizing: border-box;
        }

        .odometer { 
            display: flex; 
            background: #050505; 
            padding: 5px; 
            border: 2px solid #222; 
            margin-bottom: 15px;
        }
        .digit-container { position: relative; width: 18px; height: 28px; overflow: hidden; }
        .digit-strip { display: flex; flex-direction: column; align-items: center; transition: transform 0.3s ease-in-out; }
        .digit-strip span { height: 28px; line-height: 28px; font-size: 18px; color: #4ecdc4; font-family: 'Courier New', monospace; }

        canvas { 
            background: #080a08;
            width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .controls { 
            margin-top: 15px; 
            background: #222; 
            padding: 15px; 
            border-radius: 10px; 
            width: 90vw;
            max-width: 400px;
            box-sizing: border-box;
        }
        
        #startBtn {
            margin-top: 15px;
            padding: 15px 0;
            width: 90vw;
            max-width: 400px;
            background: #2d3e2d;
            color: #78a890;
            border: 2px solid #4a634a;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <h2>VFD ANALYZER UNIT</h2>

    <div class="odometer" id="odometer">
        <div class="digit-container" id="d4"><div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
        <div class="digit-container" id="d3"><div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
        <div class="digit-container" id="d2"><div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
        <div class="digit-container" id="d1"><div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
        <div class="digit-container" id="d0"><div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
    </div>

    <div class="vfd-container">
        <canvas id="canvas" width="600" height="220"></canvas>
    </div>

    <div class="controls">
        <label style="font-size: 11px; display: block; margin-bottom: 8px; color: #888;">INPUT GAIN</label>
        <input type="range" id="masterGain" min="1" max="100" step="1" value="40" style="width:100%">
    </div>

    <button id="startBtn">START SYSTEM</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('startBtn');

        let startTime = null;
        let peakL = 0, peakR = 0;
        const gravity = 0.3; 
        const ledCount = 18;

        function updateOdometer() {
            if (!startTime) return;
            let seconds = Math.floor((Date.now() - startTime) / 1000);
            let sStr = seconds.toString().padStart(5, '0');
            for (let i = 0; i < 5; i++) {
                const el = document.getElementById('d' + (4-i));
                if(el) el.querySelector('.digit-strip').style.transform = `translateY(-${parseInt(sStr[i]) * 28}px)`;
            }
        }

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                
                // Fix pentru deblocare audio pe Android (A52s/S24)
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                startTime = Date.now();
                setInterval(updateOdometer, 1000);

                const source = audioCtx.createMediaStreamSource(stream);
                const analyserL = audioCtx.createAnalyser();
                const analyserR = audioCtx.createAnalyser();
                const splitter = audioCtx.createChannelSplitter(2);
                
                source.connect(splitter);
                splitter.connect(analyserL, 0);
                splitter.connect(analyserR, 1);

                const dataL = new Uint8Array(analyserL.frequencyBinCount);
                const dataR = new Uint8Array(analyserR.frequencyBinCount);
                
                btn.style.display = 'none';

                function draw() {
                    requestAnimationFrame(draw);
                    analyserL.getByteFrequencyData(dataL);
                    analyserR.getByteFrequencyData(dataR);
                    
                    let volL = dataL.reduce((a,b) => a+b) / dataL.length;
                    let volR = dataR.reduce((a,b) => a+b) / dataR.length;
                    
                    let gain = document.getElementById('masterGain').value / 10;
                    volL *= gain; volR *= gain;

                    ctx.fillStyle = "#080a08";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Grila VFD
                    ctx.strokeStyle = "rgba(255,255,255,0.03)";
                    ctx.lineWidth = 1;
                    for(let i=0; i<canvas.height; i+=4) {
                        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
                    }

                    ctx.font = "24px Arial Black";
                    ctx.fillStyle = "rgba(150, 200, 180, 0.9)";
                    ctx.shadowBlur = 10; ctx.shadowColor = "#78a890";
                    ctx.fillText("LEFT", 60, 75);
                    ctx.fillText("RIGHT", 60, 175);
                    
                    ctx.font = "18px monospace";
                    ctx.shadowBlur = 5;
                    ctx.fillText("dB - 20   12  10  6   0  + 3  5", 210, 125);

                    [volL, volR].forEach((v, i) => {
                        let activeLeds = (v / 40) * ledCount;
                        let y = i === 0 ? 55 : 155;
                        
                        if (i === 0) peakL = activeLeds > peakL ? activeLeds : peakL - gravity;
                        else peakR = activeLeds > peakR ? activeLeds : peakR - gravity;
                        
                        let currentVal = i === 0 ? peakL : peakR;

                        for (let j = 0; j < ledCount; j++) {
                            let x = 210 + (j * 20);
                            let isOver = j > 13;
                            
                            if (j < currentVal) {
                                ctx.fillStyle = isOver ? "rgba(255, 200, 50, 0.9)" : "rgba(180, 230, 210, 0.9)";
                                ctx.shadowBlur = 15;
                                ctx.shadowColor = isOver ? "#ffc832" : "#b4e6d2";
                            } else {
                                ctx.fillStyle = "rgba(255,255,255,0.03)";
                                ctx.shadowBlur = 0;
                            }
                            ctx.fillRect(x, y, 12, 30);
                        }
                    });
                }
                draw();
            } catch (err) { alert("Eroare hardware: " + err); }
        };
    </script>
</body>
</html>
